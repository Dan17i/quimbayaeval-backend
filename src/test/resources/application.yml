spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
    driverClassName: org.h2.Driver
    username: sa
    password: ""
  sql:
    init:
      schema-locations: classpath:db/schema.sql
      mode: always
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  cache:
    type: none
  
# JWT config para tests
jwt:
  secret: test-secret-key-for-testing-purposes-only-minimum-256-bits-required
  expiration: 3600000

# CORS config para tests
cors:
  allowed-origins: http://localhost:5173,http://localhost:3000
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  max-age: 3600

# Logging para tests
logging:
  level:
    root: WARN
    com.quimbayaeval: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
